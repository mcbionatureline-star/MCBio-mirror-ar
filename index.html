<!DOCTYPE html>
<html lang="it">
<head>
   <meta charset="UTF-8">
   <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
   <title>MC Bio Nature - Luxury Mirror</title>

   <script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh"></script>
   <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils"></script>
   <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
   <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Montserrat:wght@300;400;600&display=swap" rel="stylesheet">

   <style>
       :root { --gold: #c5a059; --dark: #0a0c0b; }
       body { margin: 0; background: #000; font-family: 'Montserrat', sans-serif; color: white; overflow: hidden; position: fixed; width: 100%; height: 100%; }

       #mirror-container { position: relative; width: 100vw; height: 100vh; background: #000; }
       video, canvas { position: absolute; height: 100%; width: 100%; object-fit: cover; transform: scaleX(-1); }

       /* --- SCHERMATA INIZIALE --- */
       #welcome-screen {
           position: absolute; z-index: 2000; inset: 0; background: var(--dark);
           display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center;
       }
       .logo-img { width: 220px; margin-bottom: 30px; }
       .path-btn {
           width: 260px; padding: 18px; border: 1px solid var(--gold); background: transparent;
           color: var(--gold); font-family: 'Cinzel', serif; margin-bottom: 15px; letter-spacing: 2px; cursor: pointer;
       }

       /* --- PANNELLO ALTO (INFO E QR) --- */
       #info-panel {
           position: absolute; top: 15px; left: 15px; right: 15px;
           background: rgba(0, 0, 0, 0.7); padding: 15px; border-left: 3px solid var(--gold);
           display: none; z-index: 1000; backdrop-filter: blur(8px);
       }
       #p-name { font-family: 'Cinzel', serif; color: var(--gold); font-size: 1.1rem; margin: 0; text-transform: uppercase; }
       #p-desc { font-size: 0.75rem; margin: 5px 0 12px 0; color: #eee; font-weight: 300; }
       
       .buy-row { display: flex; align-items: center; justify-content: space-between; border-top: 1px solid rgba(197,160,89,0.3); padding-top: 10px; }
       .btn-buy { background: var(--gold); color: #000; padding: 10px 18px; text-decoration: none; font-weight: 700; font-size: 0.7rem; text-transform: uppercase; }
       #qrcode { background: white; padding: 3px; line-height: 0; }
       #qrcode img { width: 50px !important; height: 50px !important; }

       /* --- SELEZIONE PRODOTTI (BASSO) --- */
       #product-ui { 
           position: absolute; bottom: 30px; width: 100%; 
           display: none; justify-content: center; z-index: 1000; 
       }
       .shelf { display: flex; gap: 12px; padding: 10px; overflow-x: auto; max-width: 90%; scrollbar-width: none; }
       .prod-item {
           padding: 12px 20px; border: 1px solid var(--gold); background: rgba(0,0,0,0.85);
           color: var(--gold); font-size: 0.7rem; white-space: nowrap; cursor: pointer; font-weight: 600;
       }
       .prod-item.active { background: var(--gold); color: #000; }

       .btn-back { position: absolute; bottom: 100px; right: 20px; color: var(--gold); font-size: 0.6rem; text-decoration: underline; z-index: 1100; display:none; }
   </style>
</head>
<body>

<div id="mirror-container">
   <video id="input_video" style="display:none"></video>
   <canvas id="output_canvas"></canvas>

   <div id="welcome-screen">
       <img src="logo.jpg" class="logo-img">
       <div class="path-btn" onclick="openPath('pura')">PURA LINFA</div>
       <div class="path-btn" onclick="openPath('sorgente')">SORGENTE</div>
       <div class="path-btn" onclick="openPath('forza')">FORZA NATURA</div>
   </div>

   <div id="info-panel">
       <h2 id="p-name"></h2>
       <p id="p-desc"></p>
       <div class="buy-row">
           <a id="buy-link" href="#" target="_blank" class="btn-buy">SCOPRI E ACQUISTA</a>
           <div id="qrcode"></div>
       </div>
   </div>

   <div id="btn-reset" class="btn-back" onclick="location.reload()">TORNA AI PERCORSI</div>
   <div id="product-ui">
       <div id="shelf-list" class="shelf"></div>
   </div>
</div>

<script>
const SITE = "https://www.mcbionatureline.com";
const DATABASE = {
   'pura': [
       { name: 'MOUSSE', desc: 'Detersione soffice e profonda.', url: '/mousse', color:'rgba(255,255,255,0.2)', glow:10 },
       { name: 'ESFOLIANTE', desc: 'Luminosità cellulare immediata.', url: '/esfoliante', color:'rgba(255,220,220,0.15)', glow:5 }
   ],
   'sorgente': [
       { name: 'SIERO IDRATANTE', desc: 'Idratazione rimpolpante intensa.', url: '/siero-idratante', color:'rgba(135,206,250,0.25)', glow:30 }
   ],
   'forza': [
       { name: 'MELOGRANO', desc: 'Azione antiossidante viso.', url: '/crema-melograno', color:'rgba(255,100,100,0.2)', glow:15 },
       { name: 'STRONG 4 CORTECCE', desc: 'Effetto lifting urto naturale.', url: '/crema-4-cortecce', color:'rgba(210,180,140,0.3)', glow:25 }
   ]
};

let activeConf = null;

function openPath(id) {
   document.getElementById('welcome-screen').style.display = 'none';
   document.getElementById('product-ui').style.display = 'flex';
   document.getElementById('btn-reset').style.display = 'block';

   const shelf = document.getElementById('shelf-list');
   shelf.innerHTML = '';
   DATABASE[id].forEach((p, index) => {
       const item = document.createElement('div');
       item.className = 'prod-item';
       item.innerText = p.name;
       item.onclick = () => {
           document.querySelectorAll('.prod-item').forEach(i => i.classList.remove('active'));
           item.classList.add('active');
           displayProduct(p);
       };
       shelf.appendChild(item);
       if(index === 0) item.click(); 
   });
}

function displayProduct(p) {
   document.getElementById('info-panel').style.display = 'block';
   document.getElementById('p-name').innerText = p.name;
   document.getElementById('p-desc').innerText = p.desc;
   document.getElementById('buy-link').href = SITE + p.url;
   document.getElementById('qrcode').innerHTML = '';
   new QRCode(document.getElementById('qrcode'), { text: SITE + p.url, width: 50, height: 50 });
   activeConf = p;
}

const videoElement = document.getElementById('input_video');
const canvasElement = document.getElementById('output_canvas');
const canvasCtx = canvasElement.getContext('2d');

function onResults(results) {
    canvasElement.width = window.innerWidth;
    canvasElement.height = window.innerHeight;
    canvasCtx.save();
    canvasCtx.clearRect(0, 0, canvasElement.width, canvasElement.height);
    
    // Disegna l'immagine della telecamera pulita
    canvasCtx.drawImage(results.image, 0, 0, canvasElement.width, canvasElement.height);
    
    // Se c'è un prodotto attivo, disegna il riflesso luminoso sul viso
    if (results.multiFaceLandmarks && activeConf) {
        for (const landmarks of results.multiFaceLandmarks) {
            canvasCtx.beginPath();
            [10, 338, 297, 332, 284, 251, 389, 356, 454, 323, 361, 288, 397, 365, 379, 378, 400, 377, 152, 148, 176, 149, 150, 136, 172, 58, 132, 93, 234, 127, 162, 21, 54, 103, 67, 109].forEach((idx, i) => {
                let x = landmarks[idx].x * canvasElement.width;
                let y = landmarks[idx].y * canvasElement.height;
                if(i===0) canvasCtx.moveTo(x,y); else canvasCtx.lineTo(x,y);
            });
            canvasCtx.closePath();
            
            canvasCtx.fillStyle = activeConf.color;
            if(activeConf.glow) { 
                canvasCtx.shadowBlur = activeConf.glow; 
                canvasCtx.shadowColor = activeConf.color; 
            }
            canvasCtx.globalCompositeOperation = "screen"; // Questo rende l'effetto LUMINOSO e non grigio
            canvasCtx.fill();
        }
    }
    canvasCtx.restore();
}

const faceMesh = new FaceMesh({locateFile: (f) => `https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/${f}`});
faceMesh.setOptions({ maxNumFaces: 1, refineLandmarks: true, minDetectionConfidence: 0.5 });
faceMesh.onResults(onResults);

const camera = new Camera(videoElement, {
   onFrame: async () => { await faceMesh.send({image: videoElement}); },
   width: 1280, height: 720
});
camera.start();
</script>
</body>
</html>
