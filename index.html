<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MC Bio Nature Line - Luxury AR Mirror</title>

    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,400&family=Montserrat:wght@300;400;600&display=swap" rel="stylesheet">

    <style>
        :root { --gold: #d4af37; --dark-green: #0f1410; --white: #ffffff; }
        body { margin: 0; background: #000; font-family: 'Montserrat', sans-serif; color: var(--white); overflow: hidden; }

        #mirror-container { position: relative; width: 100vw; height: 100vh; display: flex; justify-content: center; }
        video, canvas { position: absolute; height: 100vh; width: 100vw; object-fit: cover; transform: scaleX(-1); }

        /* --- SCHERMATA BENVENUTO --- */
        #welcome-screen {
            position: absolute; z-index: 1000; inset: 0; background: rgba(10, 15, 12, 0.9);
            display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center;
            backdrop-filter: blur(15px); transition: 0.8s;
        }
        .logo-title { font-family: 'Playfair Display', serif; font-size: 3.5rem; color: var(--gold); margin: 0; }
        .logo-subtitle { letter-spacing: 5px; text-transform: uppercase; font-size: 0.8rem; margin-bottom: 40px; color: #aaa; }

        .path-selector { display: flex; gap: 25px; }
        .path-card {
            width: 180px; padding: 40px 10px; border: 1px solid rgba(212,175,55,0.4); border-radius: 100px;
            cursor: pointer; transition: 0.4s; background: rgba(255,255,255,0.03);
        }
        .path-card:hover { border-color: var(--gold); background: rgba(212,175,55,0.15); transform: translateY(-10px); }
        .path-card h3 { font-size: 0.8rem; letter-spacing: 2px; color: var(--gold); margin: 0; }

        /* --- INTERFACCIA PRODOTTI --- */
        #product-ui {
            position: absolute; bottom: 50px; width: 100%; display: none;
            flex-direction: column; align-items: center; z-index: 100;
        }
        .shelf { display: flex; gap: 15px; padding: 15px; max-width: 90%; overflow-x: auto; scrollbar-width: none; }
        .prod-btn {
            padding: 12px 25px; border-radius: 50px; background: rgba(0,0,0,0.6); border: 1px solid var(--gold);
            color: white; cursor: pointer; transition: 0.3s; font-size: 0.85rem; white-space: nowrap;
        }
        .prod-btn.active { background: var(--gold); color: black; font-weight: 600; }

        /* --- SCHEDA PRODOTTO & QR --- */
        #info-panel {
            position: absolute; top: 80px; left: 40px; width: 300px;
            background: rgba(15, 20, 16, 0.85); padding: 30px; border-radius: 20px;
            border-left: 3px solid var(--gold); display: none; backdrop-filter: blur(10px);
        }
        #info-panel h2 { font-family: 'Playfair Display', serif; margin: 0 0 10px 0; color: var(--gold); font-size: 1.6rem; }
        .ingr-highlight { color: var(--gold); font-style: italic; font-size: 0.8rem; margin-bottom: 15px; display: block; }
        #qrcode-box { background: white; padding: 10px; border-radius: 10px; display: inline-block; margin-top: 20px; }

        .back-nav { position: absolute; top: 30px; right: 40px; background: none; border: 1px solid var(--gold); color: var(--gold); padding: 10px 20px; border-radius: 25px; cursor: pointer; z-index: 500; display: none; }
    </style>
</head>
<body>

<div id="mirror-container">
    <video id="input_video" style="display:none"></video>
    <canvas id="output_canvas"></canvas>

    <button id="btn-reset" class="back-nav" onclick="location.reload()">← NUOVO PERCORSO</button>

    <div id="welcome-screen">
        <div class="logo-area">
            <h1 class="logo-title">MC Bio Nature</h1>
            <p class="logo-subtitle">Smart Mirror Experience</p>
        </div>
        <p style="margin-bottom: 30px; font-weight: 300;">Seleziona l'obiettivo della tua bellezza oggi:</p>
        <div class="path-selector">
            <div class="path-card" onclick="openPath('pura')">
                <h3>PURA LINFA</h3>
                <p style="font-size:0.6rem; margin-top:10px;">Detersione</p>
            </div>
            <div class="path-card" onclick="openPath('sorgente')">
                <h3>SORGENTE</h3>
                <p style="font-size:0.6rem; margin-top:10px;">Idratazione</p>
            </div>
            <div class="path-card" onclick="openPath('forza')">
                <h3>FORZA NATURA</h3>
                <p style="font-size:0.6rem; margin-top:10px;">Rigenerazione</p>
            </div>
        </div>
    </div>

    <div id="info-panel">
        <span class="ingr-highlight" id="p-tag"></span>
        <h2 id="p-name"></h2>
        <p id="p-desc" style="font-size:0.85rem; line-height:1.6; color: #ddd;"></p>
        <div id="qrcode-box"><div id="qrcode"></div></div>
        <p style="font-size:0.65rem; color: var(--gold); margin-top:12px; font-weight:600;">INQUADRA PER ACQUISTARE</p>
    </div>

    <div id="product-ui">
        <div id="shelf-list" class="shelf"></div>
    </div>
</div>

<script>
const SITE = "https://www.mcbionatureline.com";

const DATABASE = {
    'pura': [
        { name: 'Mousse Struccante', tag: 'Nuvola Delicata', desc: 'Elimina impurità e stress con una texture soffice e naturale.', url: '/mousse', conf: {blur:2, color:'rgba(255,255,255,0.1)'} },
        { name: 'Gel Esfoliante', tag: 'Perle di Luce', desc: 'Leviga la grana della pelle risvegliando la luminosità naturale.', url: '/esfoliante', conf: {blur:0, color:'rgba(255,200,200,0.1)'} }
    ],
    'sorgente': [
        { name: 'Siero Doppio Peso', tag: 'Acido Ialuronico Puro', desc: 'Idratazione a più livelli per un effetto rimpolpante visibile.', url: '/siero-idratante', conf: {blur:1, color:'rgba(173,216,230,0.12)', glow:15} }
    ],
    'forza': [
        { name: 'Anti-Age Melograno', tag: 'Melograno & Ialuronico', desc: 'Azione antiossidante per un viso radioso e protetto.', url: '/crema-melograno', conf: {blur:6, color:'rgba(255,190,190,0.08)', glow:8} },
        { name: 'Anti-Age Strong', tag: 'Potere di 4 Cortecce', desc: 'Effetto lifting profondo grazie alla forza degli alberi.', url: '/crema-4-cortecce', conf: {blur:14, color:'rgba(210,180,140,0.15)'} },
        { name: 'Crema Nutriente', tag: 'Ceramidi & Cera d\'Api', desc: 'Scudo protettivo e nutrimento intenso per pelli secche.', url: '/crema-nutriente', conf: {blur:4, color:'rgba(255,245,220,0.18)', contrast:-0.1} }
    ]
};

let activeConf = null;

function openPath(id) {
    document.getElementById('welcome-screen').style.opacity = '0';
    setTimeout(() => {
        document.getElementById('welcome-screen').style.display = 'none';
        document.getElementById('product-ui').style.display = 'flex';
        document.getElementById('btn-reset').style.display = 'block';
    }, 600);

    const shelf = document.getElementById('shelf-list');
    shelf.innerHTML = '';
    DATABASE[id].forEach(p => {
        const btn = document.createElement('div');
        btn.className = 'prod-btn';
        btn.innerText = p.name;
        btn.onclick = () => {
            document.querySelectorAll('.prod-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            displayProduct(p);
        };
        shelf.appendChild(btn);
    });
}

function displayProduct(p) {
    const panel = document.getElementById('info-panel');
    panel.style.display = 'block';
    document.getElementById('p-name').innerText = p.name;
    document.getElementById('p-tag').innerText = p.tag;
    document.getElementById('p-desc').innerText = p.desc;

    document.getElementById('qrcode').innerHTML = '';
    new QRCode(document.getElementById('qrcode'), {
        text: SITE + p.url,
        width: 110, height: 110,
        colorDark : "#000000",
        colorLight : "#ffffff"
    });

    activeConf = p.conf;
}

// --- CONFIGURAZIONE AI MEDIAPIPE ---
const videoElement = document.getElementById('input_video');
const canvasElement = document.getElementById('output_canvas');
const canvasCtx = canvasElement.getContext('2d');

function onResults(results) {
    canvasCtx.save();
    canvasCtx.clearRect(0, 0, canvasElement.width, canvasElement.height);
    canvasCtx.drawImage(results.image, 0, 0, canvasElement.width, canvasElement.height);

    if (results.multiFaceLandmarks && activeConf) {
        for (const landmarks of results.multiFaceLandmarks) {
            canvasCtx.beginPath();
            // Punti chiave contorno viso
            [10, 338, 297, 332, 284, 251, 389, 356, 454, 323, 361, 288, 397, 365, 379, 378, 400, 377, 152, 148, 176, 149, 150, 136, 172, 58, 132, 93, 234, 127, 162, 21, 54, 103, 67, 109].forEach((idx, i) => {
                let x = landmarks[idx].x * canvasElement.width;
                let y = landmarks[idx].y * canvasElement.height;
                if(i===0) canvasCtx.moveTo(x,y); else canvasCtx.lineTo(x,y);
            });
            canvasCtx.closePath();
            canvasCtx.fillStyle = activeConf.color;
            if(activeConf.glow) { canvasCtx.shadowBlur = activeConf.glow; canvasCtx.shadowColor = activeConf.color; }
            canvasCtx.filter = `blur(${activeConf.blur}px)`;
            canvasCtx.fill();
        }
    }
    canvasCtx.restore();
}

const faceMesh = new FaceMesh({locateFile: (f) => `https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/${f}`});
faceMesh.setOptions({ maxNumFaces: 1, refineLandmarks: true, minDetectionConfidence: 0.5 });
faceMesh.onResults(onResults);

const camera = new Camera(videoElement, {
    onFrame: async () => { await faceMesh.send({image: videoElement}); },
    width: 1280, height: 720
});
camera.start();
</script>
</body>
</html>
