<!DOCTYPE html>
<html lang="it">
<head>
   <meta charset="UTF-8">
   <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
   <title>MC Bio Nature - Luxury Mirror</title>

   <script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh"></script>
   <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils"></script>
   <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
   <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Montserrat:wght@400;600&display=swap" rel="stylesheet">

   <style>
       :root { --gold: #c5a059; --dark: #000; }
       body { margin: 0; background: #000; font-family: 'Montserrat', sans-serif; color: white; overflow: hidden; position: fixed; width: 100%; height: 100%; }

       #mirror-container { position: relative; width: 100vw; height: 100vh; background: #000; }
       video, canvas { position: absolute; height: 100%; width: 100%; object-fit: cover; transform: scaleX(-1); }

       /* --- SCHERMATA INIZIALE --- */
       #welcome-screen {
           position: absolute; z-index: 2000; inset: 0; background: var(--dark);
           display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center;
       }
       .logo-img { width: 230px; margin-bottom: 40px; }
       .path-btn {
           width: 260px; padding: 20px; border: 2px solid var(--gold); background: transparent;
           color: var(--gold); font-family: 'Cinzel', serif; margin-bottom: 20px; letter-spacing: 2px; cursor: pointer; font-weight: 700;
       }

       /* --- PANNELLO ALTO (INFO E QR) --- */
       #info-panel {
           position: absolute; top: 20px; left: 20px; right: 20px;
           background: rgba(0, 0, 0, 0.8); padding: 15px; border: 1px solid var(--gold);
           display: none; z-index: 1000; backdrop-filter: blur(10px);
       }
       #p-name { font-family: 'Cinzel', serif; color: var(--gold); font-size: 1.2rem; margin: 0; text-align: center; text-transform: uppercase; }
       
       .buy-row { display: flex; align-items: center; justify-content: space-between; margin-top: 10px; }
       .btn-buy { background: var(--gold); color: #000; padding: 10px 20px; text-decoration: none; font-weight: 800; font-size: 0.8rem; }
       #qrcode { background: white; padding: 3px; line-height: 0; }
       #qrcode img { width: 55px !important; height: 55px !important; }

       /* --- SELEZIONE PRODOTTI (MOLTO PIÙ ALTA) --- */
       #product-ui { 
           position: absolute; bottom: 140px; width: 100%; 
           display: none; justify-content: center; z-index: 1000; 
       }
       .shelf { display: flex; gap: 15px; padding: 10px; overflow-x: auto; max-width: 95%; }
       .prod-item {
           padding: 15px 25px; border: 3px solid var(--gold); background: rgba(0,0,0,0.9);
           color: var(--gold); font-size: 0.85rem; white-space: nowrap; cursor: pointer; font-weight: 800;
       }
       .prod-item.active { background: var(--gold); color: #000; border-color: white; }

       .btn-back { position: absolute; bottom: 50px; left: 50%; transform: translateX(-50%); color: var(--gold); font-size: 0.7rem; text-decoration: underline; z-index: 1100; display:none; font-weight: 600; }
   </style>
</head>
<body>

<div id="mirror-container">
   <video id="input_video" style="display:none"></video>
   <canvas id="output_canvas"></canvas>

   <div id="welcome-screen">
       <img src="logo.jpg" class="logo-img">
       <div class="path-btn" onclick="openPath('pura')">PURA LINFA</div>
       <div class="path-btn" onclick="openPath('sorgente')">SORGENTE</div>
       <div class="path-btn" onclick="openPath('forza')">FORZA NATURA</div>
   </div>

   <div id="info-panel">
       <h2 id="p-name"></h2>
       <div class="buy-row">
           <a id="buy-link" href="#" target="_blank" class="btn-buy">ACQUISTA ORA</a>
           <div id="qrcode"></div>
       </div>
   </div>

   <div id="btn-reset" class="btn-back" onclick="location.reload()">CAMBIA LINEA</div>
   <div id="product-ui">
       <div id="shelf-list" class="shelf"></div>
   </div>
</div>

<script>
const SITE = "https://www.mcbionatureline.com";
const DATABASE = {
   'pura': [
       { name: 'MOUSSE', url: '/mousse', color:'rgba(255,255,255,0.4)', glow:20 },
       { name: 'ESFOLIANTE', url: '/esfoliante', color:'rgba(255,200,200,0.3)', glow:10 }
   ],
   'sorgente': [
       { name: 'SIERO', url: '/siero-idratante', color:'rgba(0,191,255,0.4)', glow:45 }
   ],
   'forza': [
       { name: 'MELOGRANO', url: '/crema-melograno', color:'rgba(255,120,120,0.3)', glow:25 },
       { name: 'STRONG 4 CORTECCE', url: '/crema-4-cortecce', color:'rgba(255,180,50,0.5)', glow:50 }
   ]
};

let activeConf = null;

function openPath(id) {
   document.getElementById('welcome-screen').style.display = 'none';
   document.getElementById('product-ui').style.display = 'flex';
   document.getElementById('btn-reset').style.display = 'block';

   const shelf = document.getElementById('shelf-list');
   shelf.innerHTML = '';
   DATABASE[id].forEach((p, index) => {
       const item = document.createElement('div');
       item.className = 'prod-item';
       item.innerText = p.name;
       item.onclick = () => {
           document.querySelectorAll('.prod-item').forEach(i => i.classList.remove('active'));
           item.classList.add('active');
           displayProduct(p);
       };
       shelf.appendChild(item);
       if(index === 0) item.click(); 
   });
}

function displayProduct(p) {
   document.getElementById('info-panel').style.display = 'block';
   document.getElementById('p-name').innerText = p.name;
   document.getElementById('buy-link').href = SITE + p.url;
   document.getElementById('qrcode').innerHTML = '';
   new QRCode(document.getElementById('qrcode'), { text: SITE + p.url, width: 55, height: 55 });
   activeConf = p;
}

const videoElement = document.getElementById('input_video');
const canvasElement = document.getElementById('output_canvas');
const canvasCtx = canvasElement.getContext('2d');

function onResults(results) {
    canvasElement.width = window.innerWidth;
    canvasElement.height = window.innerHeight;
    canvasCtx.save();
    canvasCtx.clearRect(0, 0, canvasElement.width, canvasElement.height);
    canvasCtx.drawImage(results.image, 0, 0, canvasElement.width, canvasElement.height);
    
    if (results.multiFaceLandmarks && activeConf) {
        for (const landmarks of results.multiFaceLandmarks) {
            canvasCtx.beginPath();
            [10, 338, 297, 332, 284, 251, 389, 356, 454, 323, 361, 288, 397, 365, 379, 378, 400, 377, 152, 148, 176, 149, 150, 136, 172, 58, 132, 93, 234, 127, 162, 21, 54, 103, 67, 109].forEach((idx, i) => {
                let x = landmarks[idx].x * canvasElement.width;
                let y = landmarks[idx].y * canvasElement.height;
                if(i===0) canvasCtx.moveTo(x,y); else canvasCtx.lineTo(x,y);
            });
            canvasCtx.closePath();
            
            // ELIMINA EFFETTO CENERE: Usa "overlay" per illuminare i tratti naturali
            canvasCtx.globalCompositeOperation = "overlay"; 
            canvasCtx.fillStyle = activeConf.color;
            canvasCtx.fill();

            // AGGIUNGE GLOW: Illumina i bordi del viso con il colore del prodotto
            canvasCtx.globalCompositeOperation = "screen";
            canvasCtx.shadowBlur = activeConf.glow;
            canvasCtx.shadowColor = activeConf.color;
            canvasCtx.strokeStyle = activeConf.color;
            canvasCtx.lineWidth = 2;
            canvasCtx.stroke();
        }
    }
    canvasCtx.restore();
}

const faceMesh = new FaceMesh({locateFile: (f) => `https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/${f}`});
faceMesh.setOptions({ maxNumFaces: 1, refineLandmarks: true, minDetectionConfidence: 0.5 });
faceMesh.onResults(onResults);

const camera = new Camera(videoElement, {
   onFrame: async () => { await faceMesh.send({image: videoElement}); },
   width: 1280, height: 720
});
camera.start();
</script>
</body>
</html>
