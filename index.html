<!DOCTYPE html>
<html lang="it">
<head>
   <meta charset="UTF-8">
   <meta name="viewport" content="width=device-width, initial-scale=1.0">
   <title>MC Bio Nature - Luxury Experience</title>
   <script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh"></script>
   <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils"></script>
   <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
   <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Montserrat:wght@300;500&display=swap" rel="stylesheet">
   <style>
       :root { --gold: #c5a059; --dark: #070807; }
       body { margin: 0; background: var(--dark); font-family: 'Montserrat', sans-serif; color: white; overflow: hidden; }
       #mirror-container { position: relative; width: 100vw; height: 100vh; }
       video, canvas { position: absolute; height: 100%; width: 100%; object-fit: cover; transform: scaleX(-1); }
       #welcome-screen { position: absolute; z-index: 2000; inset: 0; background: var(--dark); display: flex; flex-direction: column; align-items: center; justify-content: center; }
       .logo-img { width: 220px; margin-bottom: 50px; }
       .path-btn { width: 300px; padding: 20px; border: 1px solid var(--gold); color: var(--gold); font-family: 'Cinzel', serif; margin-bottom: 20px; letter-spacing: 4px; cursor: pointer; text-align: center; }
       #info-panel { position: absolute; top: 20px; left: 50%; transform: translateX(-50%); width: 90%; max-width: 400px; background: rgba(0,0,0,0.8); padding: 15px; border: 1px solid var(--gold); display: none; z-index: 1000; backdrop-filter: blur(10px); }
       #p-name { font-family: 'Cinzel', serif; color: var(--gold); font-size: 1.1rem; margin: 0; text-align: center; text-transform: uppercase; }
       .buy-row { display: flex; align-items: center; justify-content: space-between; margin-top: 15px; }
       .btn-buy { background: var(--gold); color: #000; padding: 10px 20px; text-decoration: none; font-weight: 700; font-size: 0.7rem; }
       #product-ui { position: absolute; bottom: 130px; width: 100%; display: none; justify-content: center; z-index: 1000; }
       .shelf { display: flex; gap: 10px; padding: 10px; overflow-x: auto; max-width: 95%; }
       .prod-item { padding: 12px 20px; border: 1px solid var(--gold); background: #000; color: var(--gold); font-size: 0.7rem; white-space: nowrap; cursor: pointer; }
       .prod-item.active { background: var(--gold); color: #000; font-weight: 700; box-shadow: 0 0 15px var(--gold); }
       .btn-back { position: absolute; bottom: 50px; left: 50%; transform: translateX(-50%); color: var(--gold); font-size: 0.6rem; text-decoration: underline; z-index: 1100; display:none; cursor: pointer; }
   </style>
</head>
<body>
<div id="mirror-container">
   <video id="input_video" style="display:none"></video>
   <canvas id="output_canvas"></canvas>
   <div id="welcome-screen">
       <img src="logo.jpg" class="logo-img">
       <div class="path-btn" onclick="openPath('pura')">PURA LINFA</div>
       <div class="path-btn" onclick="openPath('sorgente')">SORGENTE</div>
       <div class="path-btn" onclick="openPath('forza')">FORZA NATURA</div>
   </div>
   <div id="info-panel">
       <h2 id="p-name"></h2>
       <div class="buy-row">
           <a id="buy-link" href="#" target="_blank" class="btn-buy">ESPLORA</a>
           <div id="qrcode"></div>
       </div>
   </div>
   <div id="btn-reset" class="btn-back" onclick="location.reload()">CAMBIA PERCORSO</div>
   <div id="product-ui">
       <div id="shelf-list" class="shelf"></div>
   </div>
</div>
<script>
const SITE = "https://www.mcbionatureline.com"; 
const DATABASE = {
   'pura': [
       { name: 'MOUSSE', url: '/mousse', color:'#FFFFFF', glow:15 },
       { name: 'ESFOLIANTE', url: '/esfoliante', color:'#FFCCCC', glow:15 }
   ],
   'sorgente': [
       { name: 'SIERO IDRATANTE', url: '/siero-idratante', color:'#00E5FF', glow:50 },
       { name: 'SIERO ANTI-AGE', url: '/siero-antiage', color:'#CC00FF', glow:60 }
   ],
   'forza': [
       { name: 'MELOGRANO', url: '/melograno', color:'#FF3333', glow:30 },
       { name: 'NUTRIENTE', url: '/nutriente', color:' #FFD700', glow:45 },
       { name: '4 CORTECCE', url: '/4-cortecce', color:'#FF8C00', glow:55 }
   ]
};
let activeConf = null;
function openPath(id) {
   document.getElementById('welcome-screen').style.display = 'none';
   document.getElementById('product-ui').style.display = 'flex';
   document.getElementById('btn-reset').style.display = 'block';
   const shelf = document.getElementById('shelf-list');
   shelf.innerHTML = '';
   DATABASE[id].forEach((p, index) => {
       const item = document.createElement('div');
       item.className = 'prod-item';
       item.innerText = p.name;
       item.onclick = () => {
           document.querySelectorAll('.prod-item').forEach(i => i.classList.remove('active'));
           item.classList.add('active');
           displayProduct(p);
       };
       shelf.appendChild(item);
       if(index === 0) item.click(); 
   });
}
function displayProduct(p) {
   document.getElementById('info-panel').style.display = 'block';
   document.getElementById('p-name').innerText = p.name;
   document.getElementById('buy-link').href = SITE + p.url;
   document.getElementById('qrcode').innerHTML = '';
   new QRCode(document.getElementById('qrcode'), { text: SITE + p.url, width: 40, height: 40 });
   activeConf = p;
}
const videoElement = document.getElementById('input_video');
const canvasElement = document.getElementById('output_canvas');
const canvasCtx = canvasElement.getContext('2d');
function onResults(results) {
    canvasElement.width = window.innerWidth;
    canvasElement.height = window.innerHeight;
    canvasCtx.save();
    canvasCtx.clearRect(0, 0, canvasElement.width, canvasElement.height);
    canvasCtx.drawImage(results.image, 0, 0, canvasElement.width, canvasElement.height);
    if (results.multiFaceLandmarks && activeConf) {
        for (const landmarks of results.multiFaceLandmarks) {
            canvasCtx.beginPath();
            [10, 338, 297, 332, 284, 251, 389, 356, 454, 323, 361, 288, 397, 365, 379, 378, 400, 377, 152, 148, 176, 149, 150, 136, 172, 58, 132, 93, 234, 127, 162, 21, 54, 103, 67, 109].forEach((idx, i) => {
                let x = landmarks[idx].x * canvasElement.width;
                let y = landmarks[idx].y * canvasElement.height;
                if(i===0) canvasCtx.moveTo(x,y); else canvasCtx.lineTo(x,y);
            });
            canvasCtx.closePath();
            // SOLO BAGLIORE SUI BORDI - NIENTE "CENERE" SUL VISO
            canvasCtx.globalCompositeOperation = "screen";
            canvasCtx.shadowBlur = activeConf.glow;
            canvasCtx.shadowColor = activeConf.color;
            canvasCtx.strokeStyle = activeConf.color;
            canvasCtx.lineWidth = 5;
            canvasCtx.stroke();
        }
    }
    canvasCtx.restore();
}
const faceMesh = new FaceMesh({locateFile: (f) => `https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/${f}`});
faceMesh.setOptions({ maxNumFaces: 1, refineLandmarks: true, minDetectionConfidence: 0.5 });
faceMesh.onResults(onResults);
const camera = new Camera(videoElement, { onFrame: async () => { await faceMesh.send({image: videoElement}); }, width: 1280, height: 720 });
camera.start();
</script>
</body>
</html>
