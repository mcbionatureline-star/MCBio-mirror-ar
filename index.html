<!DOCTYPE html>
<html lang="it">
<head>
   <meta charset="UTF-8">
   <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
   <title>MC Bio Nature - Luxury Experience</title>

   <script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh"></script>
   <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils"></script>
   <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
   <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Montserrat:wght@200;300;500&display=swap" rel="stylesheet">

   <style>
       :root { --gold: #c5a059; --dark-bg: #070807; --glass: rgba(0, 0, 0, 0.6); }
       body { margin: 0; background: var(--dark-bg); font-family: 'Montserrat', sans-serif; color: white; overflow: hidden; position: fixed; width: 100%; height: 100%; }

       #mirror-container { position: relative; width: 100vw; height: 100vh; }
       video, canvas { position: absolute; height: 100%; width: 100%; object-fit: cover; transform: scaleX(-1); }

       /* --- SCHERMATA INIZIALE LUXURY --- */
       #welcome-screen {
           position: absolute; z-index: 2000; inset: 0; 
           background: radial-gradient(circle at center, #1a1c1a 0%, #070807 100%);
           display: flex; flex-direction: column; align-items: center; justify-content: center;
           transition: opacity 1.2s cubic-bezier(0.4, 0, 0.2, 1);
       }
       .logo-box { animation: logoEntry 2s ease-out; text-align: center; }
       .logo-img { width: 220px; margin-bottom: 50px; filter: drop-shadow(0 0 20px rgba(197,160,89,0.2)); }
       
       .path-btn {
           width: 280px; padding: 20px; border: 1px solid var(--gold); background: rgba(197,160,89,0.03);
           color: var(--gold); font-family: 'Cinzel', serif; margin-bottom: 22px; letter-spacing: 4px; 
           cursor: pointer; font-size: 0.85rem; transition: 0.5s; backdrop-filter: blur(5px);
           text-transform: uppercase;
       }
       .path-btn:active { background: var(--gold); color: #000; }

       /* --- PANNELLO ALTO (GLASS EFFECT) --- */
       #info-panel {
           position: absolute; top: 25px; left: 15px; right: 15px;
           background: var(--glass); padding: 18px; border-top: 1px solid var(--gold);
           display: none; z-index: 1000; backdrop-filter: blur(15px); border-radius: 0 0 10px 10px;
       }
       #p-name { font-family: 'Cinzel', serif; color: var(--gold); font-size: 1.1rem; margin: 0; text-align: center; letter-spacing: 2px; }
       
       .buy-row { display: flex; align-items: center; justify-content: space-between; margin-top: 15px; }
       .btn-buy { border: 1px solid var(--gold); color: var(--gold); padding: 10px 18px; text-decoration: none; font-size: 0.65rem; letter-spacing: 2px; font-weight: 500; }
       #qrcode { background: white; padding: 4px; border-radius: 2px; }
       #qrcode img { width: 42px !important; height: 42px !important; }

       /* --- SELEZIONE PRODOTTI --- */
       #product-ui { 
           position: absolute; bottom: 130px; width: 100%; 
           display: none; justify-content: center; z-index: 1000; 
       }
       .shelf { display: flex; gap: 12px; padding: 10px; overflow-x: auto; max-width: 95%; scrollbar-width: none; }
       .prod-item {
           padding: 14px 22px; border: 1px solid rgba(197,160,89,0.2); background: rgba(0,0,0,0.7);
           color: rgba(255,255,255,0.8); font-size: 0.65rem; white-space: nowrap; cursor: pointer; font-weight: 300; letter-spacing: 1px;
       }
       .prod-item.active { border: 1px solid var(--gold); background: rgba(197,160,89,0.15); color: var(--gold); font-weight: 500; }

       .btn-back { position: absolute; bottom: 50px; left: 50%; transform: translateX(-50%); color: var(--gold); font-size: 0.55rem; text-decoration: none; border-bottom: 1px solid var(--gold); z-index: 1100; display:none; letter-spacing: 2px; opacity: 0.6; }

       @keyframes logoEntry { from { opacity: 0; transform: translateY(20px); filter: blur(10px); } to { opacity: 1; transform: translateY(0); filter: blur(0); } }
   </style>
</head>
<body>

<div id="mirror-container">
   <video id="input_video" style="display:none"></video>
   <canvas id="output_canvas"></canvas>

   <div id="welcome-screen">
       <div class="logo-box">
           <img src="logo.jpg" class="logo-img">
           <div class="path-btn" onclick="openPath('pura')">PURA LINFA</div>
           <div class="path-btn" onclick="openPath('sorgente')">SORGENTE</div>
           <div class="path-btn" onclick="openPath('forza')">FORZA NATURA</div>
       </div>
   </div>

   <div id="info-panel">
       <h2 id="p-name"></h2>
       <div class="buy-row">
           <a id="buy-link" href="#" target="_blank" class="btn-buy">ESPLORA</a>
           <div id="qrcode"></div>
       </div>
   </div>

   <div id="btn-reset" class="btn-back" onclick="location.reload()">TORNA ALLA SELEZIONE</div>
   <div id="product-ui">
       <div id="shelf-list" class="shelf"></div>
   </div>
</div>

<script>
const SITE = "https://www.mcbionatureline.com";
const DATABASE = {
   'pura': [
       { name: 'MOUSSE STRUCCANTE', url: '/mousse', color:'rgba(255,255,255,0.08)', glow:6 },
       { name: 'GEL ESFOLIANTE', url: '/esfoliante', color:'rgba(255,220,220,0.06)', glow:4 }
   ],
   'sorgente': [
       { name: 'SIERO IDRATANTE', url: '/siero-idratante', color:'rgba(180,230,255,0.12)', glow:25 }
   ],
   'forza': [
       { name: 'MELOGRANO ANTI-AGE', url: '/crema-melograno', color:'rgba(255,190,190,0.12)', glow:12 },
       { name: 'NUTRIENTE CERAMIDI', url: '/crema-nutriente-ceramidi', color:'rgba(255,220,150,0.18)', glow:20 },
       { name: '4 CORTECCE STRONG', url: '/crema-4-cortecce', color:'rgba(240,180,140,0.2)', glow:25 }
   ]
};

let activeConf = null;

function openPath(id) {
   document.getElementById('welcome-screen').style.opacity = '0';
   setTimeout(() => {
       document.getElementById('welcome-screen').style.display = 'none';
       document.getElementById('product-ui').style.display = 'flex';
       document.getElementById('btn-reset').style.display = 'block';
   }, 1200);

   const shelf = document.getElementById('shelf-list');
   shelf.innerHTML = '';
   DATABASE[id].forEach((p, index) => {
       const item = document.createElement('div');
       item.className = 'prod-item';
       item.innerText = p.name;
       item.onclick = () => {
           document.querySelectorAll('.prod-item').forEach(i => i.classList.remove('active'));
           item.classList.add('active');
           displayProduct(p);
       };
       shelf.appendChild(item);
       if(index === 0) item.click(); 
   });
}

function displayProduct(p) {
   document.getElementById('info-panel').style.display = 'block';
   document.getElementById('p-name').innerText = p.name;
   document.getElementById('buy-link').href = SITE + p.url;
   document.getElementById('qrcode').innerHTML = '';
   new QRCode(document.getElementById('qrcode'), { text: SITE + p.url, width: 42, height: 42 });
   activeConf = p;
}

const videoElement = document.getElementById('input_video');
const canvasElement = document.getElementById('output_canvas');
const canvasCtx = canvasElement.getContext('2d');

function onResults(results) {
    canvasElement.width = window.innerWidth;
    canvasElement.height = window.innerHeight;
    canvasCtx.save();
    canvasCtx.clearRect(0, 0, canvasElement.width, canvasElement.height);
    canvasCtx.drawImage(results.image, 0, 0, canvasElement.width, canvasElement.height);
    
    if (results.multiFaceLandmarks && activeConf) {
        for (const landmarks of results.multiFaceLandmarks) {
            canvasCtx.beginPath();
            [10, 338, 297, 332, 284, 251, 389, 356, 454, 323, 361, 288, 397, 365, 379, 378, 400, 377, 152, 148, 176, 149, 150, 136, 172, 58, 132, 93, 234, 127, 162, 21, 54, 103, 67, 109].forEach((idx, i) => {
                let x = landmarks[idx].x * canvasElement.width;
                let y = landmarks[idx].y * canvasElement.height;
                if(i===0) canvasCtx.moveTo(x,y); else canvasCtx.lineTo(x,y);
            });
            canvasCtx.closePath();
            
            canvasCtx.globalCompositeOperation = "soft-light"; 
            canvasCtx.fillStyle = activeConf.color;
            canvasCtx.fill();

            canvasCtx.globalCompositeOperation = "screen";
            canvasCtx.shadowBlur = activeConf.glow;
            canvasCtx.shadowColor = activeConf.color;
            canvasCtx.strokeStyle = activeConf.color;
            canvasCtx.lineWidth = 0.5;
            canvasCtx.stroke();
        }
    }
    canvasCtx.restore();
}

const faceMesh = new FaceMesh({locateFile: (f) => `https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/${f}`});
faceMesh.setOptions({ maxNumFaces: 1, refineLandmarks: true, minDetectionConfidence: 0.5 });
faceMesh.onResults(onResults);

const camera = new Camera(videoElement, {
   onFrame: async () => { await faceMesh.send({image: videoElement}); },
   width: 1280, height: 720
});
camera.start();
</script>
</body>
</html>
